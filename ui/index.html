<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Ecosystem Dashboard</title>
<link rel="stylesheet" href="/neo_minimal.css">
<style>
:root {
  --bg: #050508;
  --bg-card: #0d0e14;
  --bg-hover: #13151f;
  --border: #181b26;
  --text: #f0f2f8;
  --text-dim: #8a91b0;
  --accent: #00f0ff;
  --green: #00f0ff;
  --red: #ff0055;
  --orange: #ffe600;
  --purple: #9d4edd;

  --planner: #ffe600;
  --blender: #00f0ff;
  --memory: #9d4edd;
  --tool: #00f0ff;
  --review: #ff0055;
  --fallback: #8a91b0;
  --human: #ffe600;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

/* Layout */
.app { display: grid; grid-template-columns: 240px 1fr 320px; height: 100vh; gap: 0; }

/* ─── Header ─── */
.header {
  grid-column: 1 / -1;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 0.6rem 1.2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 10;
}
.header h1 { font-size: 1rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
.header h1 span { color: var(--text-dim); font-weight: 400; }
.agent-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; }

.pill {
  display: flex; align-items: center; gap: 0.35rem;
  padding: 0.2rem 0.6rem; border-radius: 12px;
  font-size: 0.72rem; background: var(--bg); border: 1px solid var(--border);
}
.pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); }
.pill.active .dot { background: var(--green); box-shadow: 0 0 4px var(--green); }
.pill.thinking .dot { background: var(--orange); animation: pulse 1.5s infinite; }
.pill.error .dot { background: var(--red); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* ─── Left Sidebar: Agent Cards ─── */
.sidebar {
  background: var(--bg-card);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 0.8rem;
}
.agent-card {
  background: var(--bg);
  border-radius: 8px;
  padding: 0.7rem 0.8rem;
  margin-bottom: 0.5rem;
  border-left: 3px solid var(--text-dim);
  cursor: pointer; transition: background 0.15s;
}
.agent-card:hover { background: var(--bg-hover); }
.agent-card.planner { border-color: var(--planner); }
.agent-card.blender { border-color: var(--blender); }
.agent-card.memory { border-color: var(--memory); }
.agent-card.tool { border-color: var(--tool); }
.agent-card.review { border-color: var(--review); }
.agent-card.fallback { border-color: var(--fallback); }
.agent-card.human { border-color: var(--human); }

.agent-card .name { font-size: 0.85rem; font-weight: 600; display: flex; justify-content: space-between; }
.agent-card .role { font-size: 0.7rem; color: var(--text-dim); margin-top: 0.15rem; }
.agent-card .tags { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-top: 0.4rem; }
.tag {
  font-size: 0.62rem; padding: 0.1rem 0.35rem;
  border-radius: 4px; background: var(--bg-card); color: var(--text-dim);
}

/* ─── Center: Chat ─── */
.chat-area { display: flex; flex-direction: column; background: var(--bg); }
.messages {
  flex: 1; overflow-y: auto; padding: 1rem;
  display: flex; flex-direction: column; gap: 0.75rem;
}
.msg {
  animation: fadeIn 0.25s ease; max-width: 85%;
}
.msg.human { align-self: flex-end; }
.msg.human .bubble { background: #1f6feb22; border-color: #1f6feb44; }
.msg.planner .bubble { border-color: var(--planner); }
.msg.blender .bubble { border-color: var(--blender); }
.msg.memory .bubble { border-color: var(--memory); }
.msg.tool .bubble { border-color: var(--tool); }
.msg.error .bubble { border-color: var(--red); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.msg-header {
  display: flex; align-items: center; gap: 0.4rem;
  margin-bottom: 0.25rem; padding: 0 0.4rem;
}
.msg-avatar {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem;
}
.msg-author { font-size: 0.75rem; font-weight: 600; }
.msg-time { font-size: 0.65rem; color: var(--text-dim); margin-left: auto; }
.msg-type { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

.bubble {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 0 10px 10px 10px;
  padding: 0.6rem 0.9rem;
  font-size: 0.8rem;
  line-height: 1.5;
}
.msg.human .bubble { border-radius: 10px 0 10px 10px; }
.bubble pre {
  background: #0d1117; padding: 0.5rem; border-radius: 6px;
  overflow-x: auto; margin: 0.4rem 0; font-size: 0.72rem;
}
.bubble code { background: #0d1117; padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.75rem; }
.bubble img { max-width: 100%; border-radius: 6px; margin-top: 0.4rem; }

/* ─── Right Panel: Scratchpad + Telemetry ─── */
.right-panel {
  background: var(--bg-card);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.panel-section {
  flex: 1; overflow-y: auto; padding: 0.8rem;
  border-bottom: 1px solid var(--border);
}
.panel-section:last-child { border-bottom: none; }
.panel-title {
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-dim); margin-bottom: 0.6rem; display: flex;
  justify-content: space-between; align-items: center;
}

.sec-card {
  background: var(--bg); border-radius: 6px; padding: 0.5rem 0.6rem;
  margin-bottom: 0.4rem; font-size: 0.72rem; line-height: 1.5;
}
.sec-card h4 { font-size: 0.68rem; color: var(--accent); margin-bottom: 0.2rem; }

.metric {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.35rem 0; font-size: 0.75rem; border-bottom: 1px solid var(--border);
}
.metric:last-child { border-bottom: none; }
.metric .val { font-weight: 600; font-variant-numeric: tabular-nums; }

.tool-entry {
  font-size: 0.7rem; padding: 0.35rem 0.5rem;
  background: var(--bg); border-radius: 4px; margin-bottom: 0.3rem;
  border-left: 3px solid var(--green);
}
.tool-entry.error { border-color: var(--red); }
.tool-entry .t-name { font-weight: 600; }
.tool-entry .t-agent { color: var(--text-dim); font-size: 0.65rem; }
.tool-entry .t-latency { float: right; color: var(--text-dim); }

/* ─── Loading ─── */
.loading { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); font-size: 0.85rem; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🤖 Agent Ecosystem <span>| Blender Team</span></h1>
    <div style="display:flex;align-items:center;gap:1rem">
      <a href="/graph" style="color:var(--accent);font-size:0.75rem;text-decoration:none">🕸️ Graph</a>
      <a href="/vectors" style="color:var(--accent);font-size:0.75rem;text-decoration:none">🎯 Vectors</a>
      <a href="/tools" style="color:var(--accent);font-size:0.75rem;text-decoration:none">🔧 Tools</a>
      <div class="agent-pills" id="agentPills"></div>
    </div>
  </div>

  <!-- Left: Agent list -->
  <div class="sidebar" id="agentList">
    <div class="loading">Laddar agenter...</div>
  </div>

  <!-- Center: Chat -->
  <div class="chat-area">
    <div class="messages" id="messages"></div>
  </div>

  <!-- Right: Scratchpad + Telemetry + Tools -->
  <div class="right-panel">
    <div class="panel-section" id="scratchpadSection">
      <div class="panel-title">📋 Scratchpad <span id="scratchVersion"></span></div>
      <div id="scratchpad"><div class="loading">Laddar...</div></div>
    </div>
    <div class="panel-section" style="flex:0.6">
      <div class="panel-title">📊 Telemetry</div>
      <div id="telemetry">
        <div class="metric"><span>Active Agents</span><span class="val" id="mAgents">0</span></div>
        <div class="metric"><span>Messages</span><span class="val" id="mMessages">0</span></div>
        <div class="metric"><span>Avg Latency</span><span class="val" id="mLatency">—</span></div>
        <div class="metric"><span>Tool Calls</span><span class="val" id="mTools">0</span></div>
        <div class="metric"><span>Tool Fail Rate</span><span class="val" id="mFailRate">0%</span></div>
      </div>
    </div>
    <div class="panel-section" id="toolsSection">
      <div class="panel-title">🔧 Recent Tool Calls</div>
      <div id="toolLog"><div class="loading">Väntar...</div></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = '__SUPABASE_URL__';
const SUPABASE_ANON_KEY = '__SUPABASE_ANON_KEY__';

const AGENTS = {
  planner: { name: 'Planner', icon: '🧠', color: '#d29922' },
  'blender-agent': { name: 'Blender', icon: '🔷', color: '#58a6ff' },
  'memory-agent': { name: 'Memory', icon: '📚', color: '#bc8cff' },
  'tool-agent': { name: 'Tool', icon: '🔧', color: '#3fb950' },
  review: { name: 'Review', icon: '🔍', color: '#f85149' },
  fallback: { name: 'Fallback', icon: '🛡️', color: '#8b949e' },
  human: { name: 'You', icon: '👤', color: '#f0883e' },
};

let agentStatus = {};
let messageCount = 0;
let latencies = [];
let toolCount = 0;
let toolFails = 0;

// ─── Fetch ───
async function api(path) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
  });
  return res.json();
}

async function rpc(name, params) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${name}`, {
    method: 'POST', headers: { 'Content-Type': 'application/json', apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` },
    body: JSON.stringify(params)
  });
  return res.json();
}

// ─── Agent Cards ───
async function loadAgents() {
  const data = await api('agents?select=*');
  data.forEach(a => agentStatus[a.id] = a);
  renderAgents();
  renderPills();
}

function renderAgents() {
  const el = document.getElementById('agentList');
  el.innerHTML = '';
  for (const [id, a] of Object.entries(agentStatus)) {
    const info = AGENTS[id] || { name: id, icon: '🤖', color: '#8b949e' };
    const statusDot = a.status === 'active' || a.status === 'thinking' ? '🟢' : a.status === 'error' ? '🔴' : '⚫';
    const caps = (a.capabilities || []).slice(0, 4).map(c => `<span class="tag">${c}</span>`).join('');
    el.innerHTML += `
      <div class="agent-card ${a.role}" data-agent="${id}">
        <div class="name"><span>${info.icon} ${a.name || info.name}</span><span>${statusDot}</span></div>
        <div class="role">${a.role} · ${a.status}</div>
        <div class="tags">${caps}</div>
      </div>`;
  }
}

function renderPills() {
  const el = document.getElementById('agentPills');
  el.innerHTML = '';
  for (const [id, a] of Object.entries(agentStatus)) {
    const info = AGENTS[id] || { name: id, icon: '🤖' };
    const cls = a.status === 'thinking' ? 'thinking' : a.status === 'active' ? 'active' : a.status === 'error' ? 'error' : '';
    el.innerHTML += `<div class="pill ${cls}"><span class="dot"></span>${info.icon} ${a.name || info.name}</div>`;
  }
}

// ─── Messages ───
async function loadMessages() {
  const data = await api('agent_conversations?select=*&order=created_at.desc&limit=50');
  data.reverse().forEach(m => renderMessage(m, false));
  document.getElementById('mMessages').textContent = data.length;
}

function renderMessage(msg, animate = true) {
  const el = document.getElementById('messages');
  const info = AGENTS[msg.from_agent] || { name: msg.from_agent, icon: '🤖', color: '#8b949e' };
  const isHuman = msg.from_agent === 'human';
  const isError = msg.message_type === 'error';
  const agentCls = isHuman ? 'human' : isError ? 'error' : msg.from_agent.replace('-agent', '');

  const div = document.createElement('div');
  div.className = `msg ${agentCls}`;
  const time = new Date(msg.created_at).toLocaleTimeString();
  const formatted = formatContent(msg.content);

  div.innerHTML = `
    <div class="msg-header">
      <span style="font-size:0.85rem">${info.icon}</span>
      <span class="msg-author" style="color:${info.color}">${info.name}</span>
      <span class="msg-type">${msg.message_type}</span>
      <span class="msg-time">${time}</span>
    </div>
    <div class="bubble">${formatted}</div>`;

  if (animate) {
    el.appendChild(div);
  } else {
    el.appendChild(div);
  }
  el.scrollTop = el.scrollHeight;

  messageCount++;
  if (msg.latency_ms) {
    latencies.push(msg.latency_ms);
    if (latencies.length > 100) latencies.shift();
    const avg = Math.round(latencies.reduce((a,b) => a+b, 0) / latencies.length);
    document.getElementById('mLatency').textContent = `${avg}ms`;
  }
}

function formatContent(text) {
  if (!text) return '';
  return text
    .replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

// ─── Scratchpad ───
async function loadScratchpad() {
  const threads = await api('agent_conversations?select=thread_id&order=created_at.desc&limit=1');
  if (!threads.length) return;
  const tid = threads[0].thread_id;
  const data = await rpc('get_scratchpad', { p_thread_id: tid });
  renderScratchpad(data);
}

function renderScratchpad(data) {
  const el = document.getElementById('scratchpad');
  if (!data || !data.length) {
    el.innerHTML = '<div class="sec-card"><em>Ingen aktiv scratchpad</em></div>';
    return;
  }
  const labels = { plan: 'Plan', blender_state: 'Blender State', memory_refs: 'Memory Refs', blockers: 'Blockers', human_input_needed: 'Human Input', raw_notes: 'Notes' };
  el.innerHTML = data.map(s => `
    <div class="sec-card">
      <h4>${labels[s.section] || s.section}</h4>
      <div>${formatContent((s.content || '').slice(0, 300))}</div>
    </div>`).join('');
  document.getElementById('scratchVersion').textContent = `v${data[0]?.version || '?'}`;
}

// ─── Tool Calls ───
async function loadToolCalls() {
  const data = await api('tool_calls?select=*&order=created_at.desc&limit=20');
  renderToolCalls(data);
}

function renderToolCalls(data) {
  const el = document.getElementById('toolLog');
  if (!data || !data.length) {
    el.innerHTML = '<div class="loading">Inga tool calls än</div>';
    return;
  }
  toolCount = data.length;
  const fails = data.filter(d => d.success === false);
  toolFails = fails.length;
  document.getElementById('mTools').textContent = toolCount;
  document.getElementById('mFailRate').textContent = toolCount ? `${Math.round(toolFails / toolCount * 100)}%` : '0%';

  el.innerHTML = data.slice(0, 15).map(t => {
    const cls = t.success === false ? 'error' : '';
    const icon = t.success === false ? '❌' : t.success === true ? '✅' : '⏳';
    return `<div class="tool-entry ${cls}">
      <span class="t-name">${icon} ${t.tool_name}</span>
      <span class="t-agent">by ${t.agent_id}</span>
      <span class="t-latency">${t.latency_ms || '?'}ms</span>
    </div>`;
  }).join('');
}

// ─── Realtime ───
function connectRealtime() {
  const wsUrl = SUPABASE_URL.replace('https://', 'wss://');
  const ws = new WebSocket(`${wsUrl}/realtime/v1/websocket?apikey=${SUPABASE_ANON_KEY}&vsn=1.0.0`);

  ws.onopen = () => {
    // Subscribe to agent_conversations
    ws.send(JSON.stringify({
      topic: `realtime:agent_conversations`,
      event: 'phx_join',
      payload: {}, ref: '1'
    }));
    // Subscribe to agents
    ws.send(JSON.stringify({
      topic: `realtime:agents`,
      event: 'phx_join',
      payload: {}, ref: '2'
    }));
    // Subscribe to tool_calls
    ws.send(JSON.stringify({
      topic: `realtime:tool_calls`,
      event: 'phx_join',
      payload: {}, ref: '3'
    }));
  };

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.event === 'INSERT' && data.payload?.record) {
        const rec = data.payload.record;
        if (data.topic?.includes('agent_conversations')) {
          renderMessage(rec);
        }
        if (data.topic?.includes('agents')) {
          agentStatus[rec.id] = rec;
          renderPills();
          renderAgents();
          document.getElementById('mAgents').textContent = Object.keys(agentStatus).length;
        }
        if (data.topic?.includes('tool_calls')) {
          toolCount++;
          if (rec.success === false) toolFails++;
          loadToolCalls();
        }
      }
    } catch (e) {}
  };

  ws.onclose = () => setTimeout(connectRealtime, 3000);
}

// ─── Init ───
async function init() {
  await loadAgents();
  await loadMessages();
  await loadScratchpad();
  await loadToolCalls();
  document.getElementById('mAgents').textContent = Object.keys(agentStatus).length;
  connectRealtime();

  // Refresh scratchpad every 5s
  setInterval(loadScratchpad, 5000);
}

init();
</script>
</body>
</html>
